name: label-studio

# ============================================================
# Label Studio — Full Stack
# Services: PostgreSQL · Redis · MinIO · Label Studio · Nginx
# Cloudflare Tunnel routes:
#   label-studio.example.com → nginx:80 → label-studio:8080
#   minio.example.com        → minio:9000 (GET/HEAD WAF rule on CF)
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labelstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-labelstudio}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labelstudio} -d ${POSTGRES_DB:-labelstudio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # External domain — presigned URLs will use this base
      MINIO_SERVER_URL: https://${MINIO_EXTERNAL_HOST:-minio.example.com}
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_EXTERNAL_HOST:-minio.example.com}/ui/
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── MinIO Init (one-shot bucket + CORS setup) ───────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-label-studio-bucket}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    networks:
      - internal

  # ── Label Studio ────────────────────────────────────────────
  label-studio:
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    user: "1001:1001"
    environment:
      # Database
      DJANGO_DB: default
      POSTGRESDB_HOST: db
      POSTGRESDB_PORT: "5432"
      POSTGRESDB_NAME: ${POSTGRES_DB:-labelstudio}
      POSTGRESDB_USER: ${POSTGRES_USER:-labelstudio}
      POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis (task queue + caching)
      REDIS_LOCATION: redis://:${REDIS_PASSWORD}@redis:6379/1

      # Django
      SECRET_KEY: ${LABEL_STUDIO_SECRET_KEY}
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_HOST}

      # Cloudflare Tunnel forwards real IP/host via headers
      USE_X_FORWARDED_HOST: "true"
      USE_X_FORWARDED_PORT: "true"
      # Trust CF Tunnel's forwarded headers
      DJANGO_CSRF_TRUSTED_ORIGINS: ${LABEL_STUDIO_HOST}

      # Storage — disable SSRF protection for internal MinIO calls
      SSRF_PROTECTION_ENABLED: "false"
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /home/user

      # Security
      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK: ${LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK:-true}

      # Initial admin (only used on first run)
      DEFAULT_USERNAME: ${LABEL_STUDIO_USERNAME:-admin@example.com}
      DEFAULT_USER_PASSWORD: ${LABEL_STUDIO_PASSWORD}

      # Logging
      DJANGO_LOG_LEVEL: WARNING
      LOG_LEVEL: WARNING
    volumes:
      - label-studio-data:/label-studio/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  # ── Nginx (reverse proxy) ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      label-studio:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── Cloudflare Tunnel ────────────────────────────────────────
  # Routes configured in CF Zero Trust dashboard:
  #   label-studio.example.com → http://nginx:80
  #   minio.example.com        → http://minio:9000
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres-data:
  redis-data:
  minio-data:
  label-studio-data:
  hf-cache:

networks:
  internal:
    driver: bridge
