# ============================================================
# Label Studio — Nginx vhost
# Receives connections from Cloudflare Tunnel (HTTP, no TLS here).
# CF handles TLS termination at the edge.
# ============================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # CF Tunnel health probe
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Label Studio — main app + WebSocket (annotations, real-time)
    location / {
        proxy_pass         http://label-studio:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Forward real client info from CF Tunnel
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Cloudflare Tunnel connects to nginx over plain HTTP, so $scheme = "http".
        # Hardcode https — this nginx only receives traffic from CF Tunnel (always HTTPS).
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Timeouts — Label Studio can be slow on first load / large exports
        proxy_read_timeout    300s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;

        # Buffer tuning for large annotation payloads
        proxy_buffer_size          128k;
        proxy_buffers          4   256k;
        proxy_busy_buffers_size    256k;
    }
}
